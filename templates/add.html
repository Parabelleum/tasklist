<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>➕ Add New Task</h1>
        
        <form method="POST" action="{{ url_for('add') }}" class="task-form">
            <div class="form-group">
                <label for="title">Task Title *</label>
                <input type="text" id="title" name="title" required placeholder="e.g., Buy groceries">
            </div>
            
            <div class="form-group">
                <label for="description">Description (optional)</label>
                <textarea id="description" name="description" rows="4" placeholder="Add more details..."></textarea>
            </div>
            
            <div class="form-buttons">
                <button type="submit" class="btn btn-submit">💾 Save Task</button>
                <a href="{{ url_for('index') }}" class="btn btn-cancel">❌ Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
